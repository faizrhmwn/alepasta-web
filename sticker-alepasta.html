<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Stiker Alepasta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;1,800;1,900&family=Knewave&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --red: #da291c;
            --cream: #efebe1;
            --yellow: #ffc72c;
            --dark: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #b0a8a0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── SCREEN UI ── */
        #screenUI {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
        }
        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 15px 30px;
            border-radius: 999px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-decoration: none;
        }
        .btn-primary { background: var(--red); color: var(--cream); }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        /* ── STICKER ── */
        .sticker {
            width: 2000px;
            height: 2000px;
            background-color: var(--red);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Content Area */
        .deco {
            position: absolute;
            z-index: 1;
            opacity: 0.9;
            filter: drop-shadow(8px 8px 0 rgba(0,0,0,0.15));
        }
        .deco-1 { top: 90px; left: 100px; width: 280px; transform: rotate(15deg); }
        .deco-2 { top: 120px; left: 1640px; width: 260px; transform: rotate(-20deg); }
        .deco-3 { top: 1340px; left: 100px; width: 330px; transform: rotate(-10deg); }
        .deco-4 { top: 1380px; left: 1620px; width: 260px; transform: rotate(25deg); }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .brand {
            font-family: 'Knewave', cursive;
            font-size: 380px;
            color: var(--cream);
            text-shadow: 18px 18px 0 var(--dark);
            letter-spacing: 12px;
            line-height: 1.1;
            margin-bottom: 50px;
            transform: rotate(-3deg);
        }

        .tagline {
            font-family: 'Knewave', cursive;
            font-size: 100px;
            color: var(--yellow);
            letter-spacing: 3px;
            transform: rotate(-3deg);
        }

        /* Footer Section */
        .footer {
            height: 280px;
            background-color: var(--cream);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
        }

        .social-group {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .social-group svg {
            width: 90px;
            height: 90px;
        }

        .social-group svg.grab-icon {
            width: 130px;
            height: auto;
        }

        .social-text {
            font-size: 55px;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="screenUI">
        <a href="index.html" class="btn" style="background: white; color: var(--dark);">KEMBALI KE HOME</a>
        <button class="btn btn-primary" onclick="downloadSticker()" id="downloadBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            DOWNLOAD STIKER (6000x6000px)
        </button>
    </div>

    <div class="sticker" id="stickerTarget">
        <!-- Custom Vector Decorations: Macaroni, Spaghetti, Burger, Hotdog -->
        
        <!-- 1. Macaroni -->
        <svg class="deco deco-1" xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 100 100">
            <path d="M 25,75 C 25,20 75,20 75,75" stroke="#ffc72c" stroke-width="25" stroke-linecap="round" fill="none"/>
            <path d="M 25,75 C 25,20 75,20 75,75" stroke="#efebe1" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
        </svg>
        
        <!-- 2. Spaghetti -->
        <svg class="deco deco-2" xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 100 100">
            <ellipse cx="50" cy="80" rx="40" ry="10" fill="#efebe1"/>
            <path d="M 25,75 C 10,40 50,20 50,50 C 50,80 90,40 75,75" stroke="#ffc72c" stroke-width="12" stroke-linecap="round" fill="none"/>
            <path d="M 35,75 C 30,50 60,30 60,60 C 60,80 80,50 65,75" stroke="#ffc72c" stroke-width="8" stroke-linecap="round" fill="none"/>
        </svg>

        <!-- 3. Burger -->
        <svg class="deco deco-3" xmlns="http://www.w3.org/2000/svg" width="330" height="330" viewBox="0 0 100 100">
            <!-- Top Bun -->
            <path d="M 15,45 C 15,10 85,10 85,45 Z" fill="#ffc72c"/>
            <!-- Patty -->
            <rect x="10" y="52" width="80" height="12" rx="6" fill="#efebe1"/>
            <!-- Cheese/Lettuce -->
            <path d="M 15,64 L 25,72 L 40,64 L 60,72 L 75,64 L 85,72 L 85,64 Z" fill="#ffc72c"/>
            <!-- Bottom Bun -->
            <rect x="20" y="75" width="60" height="15" rx="7" fill="#ffc72c"/>
        </svg>

        <!-- 4. Hotdog -->
        <svg class="deco deco-4" xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 100 100">
            <!-- Bun (Bottom & Top overlapping shape) -->
            <path d="M 10,50 C 10,20 90,20 90,50 C 90,80 10,80 10,50 Z" fill="#efebe1"/>
            <!-- Sausage -->
            <rect x="15" y="42" width="70" height="16" rx="8" fill="#ffc72c"/>

            <path d="M 20,50 Q 25,45 30,50 T 40,50 T 50,50 T 60,50 T 70,50 T 80,50" stroke="#efebe1" stroke-width="4" stroke-linecap="round" fill="none"/>
        </svg>

            </div>

            </div>
        </div>
    </div>

    <script>
        function downloadSticker() {
            const btn = document.getElementById('downloadBtn');
            const target = document.getElementById('stickerTarget');
            
            btn.innerHTML = 'RENDERING... (MOHON TUNGGU)';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            // Scale 3 to get 6000x6000 from 2000x2000
            html2canvas(target, {
                scale: 3, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#da291c',
                windowWidth: 2000,
                windowHeight: 2000,
                scrollX: 0,
                scrollY: 0
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'alepasta-sticker-6000px.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
                btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> DOWNLOAD STIKER (6000x6000px)';
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }).catch(err => {
                console.error('Error generating image:', err);
                alert('Gagal mendownload stiker. Pastikan buka file html melalui Localhost/Live Server.');
                btn.innerHTML = 'COBA LAGI';
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            });
        }
    </script>
</body>
</html>
