<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Menu Alepasta</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #f14e06;
            --cream: #f1ece6;
            --dark: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #c8c0b8;
        }

        /* ── SCREEN UI ── */
        #screenUI {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            gap: 10px;
        }
        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 999px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .btn-primary { background: var(--orange); color: var(--cream); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(241,78,6,0.4); }
        .btn-secondary { background: white; color: var(--dark); }
        .btn-secondary:hover { background: var(--dark); color: white; }

        /* ── PAGE WRAP ── */
        .page-wrap {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
        }

        /* ── BASE PAGE ── */
        .page {
            width: 297mm;
            height: 210mm;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.25);
            position: relative;
            flex-shrink: 0;
        }

        /* ── COVER ── */
        .cover-page {
            background: var(--orange);
            display: flex;
        }
        .cover-left {
            width: 50%;
            padding: 44px 52px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .cover-logo {
            font-size: 76px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: var(--cream);
            letter-spacing: -3px;
            line-height: 0.88;
        }
        .cover-tagline {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.55;
            margin-top: 10px;
        }
        .cover-info {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.5;
            line-height: 2.2;
        }
        .cover-right {
            width: 50%;
            position: relative;
            overflow: hidden;
        }
        .cover-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, var(--orange) 0%, transparent 35%);
            z-index: 1;
        }
        .cover-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0.75;
        }
        .cover-year {
            position: absolute;
            bottom: 32px;
            left: 52px;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.35;
        }

        /* ── CATEGORY PAGE ── */
        .cat-page {
            background: var(--cream);
            display: flex;
        }

        /* Left strip */
        .cat-strip {
            width: 52px;
            background: var(--orange);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 20px 0;
            gap: 8px;
        }
        .cat-strip-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--cream);
            opacity: 0.7;
        }

        /* Main content */
        .cat-body {
            flex: 1;
            padding: 28px 32px 24px 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Category header */
        .cat-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--orange);
            padding-bottom: 12px;
            flex-shrink: 0;
        }
        .cat-head-left {}
        .cat-head-label {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--orange);
            opacity: 0.55;
            margin-bottom: 4px;
        }
        .cat-head-title {
            font-size: 44px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: var(--dark);
            letter-spacing: -2px;
            line-height: 0.9;
        }
        .cat-head-right {
            text-align: right;
        }
        .cat-head-count {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--dark);
            opacity: 0.3;
        }
        .cat-head-brand {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--orange);
            opacity: 0.35;
            margin-top: 2px;
        }

        /* Items grid */
        .items-grid {
            display: grid;
            gap: 14px;
            flex: 1;
            overflow: hidden;
        }

        /* Item card */
        .item-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }
        .item-img {
            flex: 1;
            overflow: hidden;
            background: #e0d8d0;
            position: relative;
            min-height: 0;
        }
        .item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .bs-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #fbbf24;
            color: #78350f;
            font-size: 6px;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 3px 7px;
            border-radius: 5px;
        }
        .item-info {
            padding: 8px 10px 10px;
            flex-shrink: 0;
        }
        .item-name {
            font-size: 11px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: var(--dark);
            letter-spacing: -0.3px;
            line-height: 1.15;
            margin-bottom: 3px;
        }
        .item-desc {
            font-size: 7.5px;
            font-weight: 600;
            color: #999;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-price {
            display: inline-block;
            background: var(--orange);
            color: var(--cream);
            font-size: 10px;
            font-weight: 900;
            font-style: italic;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* ── PRINT ── */
        @media print {
            @page { size: A4 landscape; margin: 0; }

            *, *::before, *::after {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { background: white; }
            #screenUI { display: none !important; }
            .page-wrap { padding: 0; gap: 0; align-items: stretch; }
            .page {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
                page-break-after: always;
                break-after: page;
            }
        }
    </style>
</head>
<body>

<div id="screenUI">
    <a href="index.html" class="btn btn-secondary">← Kembali</a>
    <button onclick="window.print()" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
        Print / Save PDF
    </button>
</div>

<div class="page-wrap" id="pageWrap"></div>

<script>
    const menuCategories = {
        "Pasta": [
            { nama: "Aglio e Olio", harga: "10k", desc: "Pasta dengan minyak bawang putih gurih dengan taburan chili flakes.", img: "aglioeolio.png" },
            { nama: "Alfredo", harga: "10k", desc: "Pasta saus putih creamy dengan aroma bawang putih yang gurih.", img: "alfredo.png" },
            { nama: "Bolognese", harga: "10k", desc: "Pasta saus Bolognese gurih dengan daging cincang yang melimpah.", img: "bolognese.png" },
            { nama: "Mac & Cheese", harga: "10k", desc: "Makaroni lembut dengan saus keju yang super creamy.", img: "macncheese.png" }
        ],
        "Rice": [
            { nama: "Alepasta Bowl", harga: "12k", desc: "Nasi ayam krispi dengan lumeran saus homemade rahasia khas Alepasta.", img: "alepasta-bowl.png" },
            { nama: "Bolognese Bowl", harga: "12k", desc: "Nasi ayam krispi dengan siraman saus Bolognese premium.", img: "bolognese-bowl.png" },
            { nama: "Curry Bowl", harga: "12k", desc: "Nasi ayam krispi dengan siraman saus Kari Jepang kental.", img: "curry-bowl.png" }
        ],
        "Salad": [
            { nama: "Simple Green", harga: "10k", desc: "Salad sayur segar dengan topping 1/2 telur rebus.", img: "simple-green.png" },
            { nama: "Egg-tra Green", harga: "13k", desc: "Salad sayur segar dengan topping 1 telur rebus utuh.", img: "eggtra-green.png" },
            { nama: "Signature Green", harga: "15k", desc: "Salad sayur segar dengan topping ayam panggang (grill).", img: "signature-green.png" }
        ],
        "Side": [
            { nama: "Burger", harga: "10k", desc: "Burger ayam krispi dengan lumeran saus homemade khas Alepasta.", img: "burger.png" },
            { nama: "Chicken Wrap", harga: "12k", desc: "Tortilla jumbo isian ayam, selada, keju, dan saus Alepasta.", img: "wrap.png" },
            { nama: "Bolognese Fries", harga: "15k", desc: "Kentang krispi + saus bolognese daging cincang.", img: "bolognese-fries.png" },
            { nama: "Burger w/Fries", harga: "15k", desc: "Burger ayam krispi yang dipadukan dengan kentang goreng renyah.", img: "burgerwfries.png" },
            { nama: "Cheesy Fries", harga: "15k", desc: "Kentang krispi + saus keju lumer melimpah.", img: "cheesy-fries.png" },
            { nama: "Combo", harga: "15k", desc: "Paket makaroni, ayam, dan kentang dengan saus homemade.", img: "combo.png" }
        ],
        "Beverage": [
            { nama: "Blue Ocean Lemon", harga: "7k", desc: "Sensasi asam manis lemon dengan tampilan biru segar.", img: "blue-ocean.png" },
            { nama: "Lemon Tea", harga: "7k", desc: "Teh lemon dengan takaran asam manis yang seimbang.", img: "lemon-tea.png" },
            { nama: "Matcha", harga: "9k", desc: "Teh hijau dengan aroma khas yang autentik dan manis pas.", img: "matcha.png" },
            { nama: "Milo", harga: "9k", desc: "Racikan cokelat Milo yang kental dan pekat.", img: "milo.png" }
        ],
        "A La Carte": [
            { nama: "Ayam Crispy", harga: "6k", desc: "Ayam crispy boneless renyah.", img: "ayam-carte.png" },
            { nama: "Alepasta Sauce", harga: "3k", desc: "Saus homemade Alepasta yang creamy, tangy, dan peppery.", img: "alepasta-saus.png" }
        ]
    };

    const bestSellers = ["Mac & Cheese", "Curry Bowl", "Signature Green", "Burger", "Milo"];
    const wrap = document.getElementById('pageWrap');

    // ── COVER ──
    wrap.innerHTML += `
        <div class="page cover-page">
            <div class="cover-left">
                <div>
                    <div class="cover-logo">Alepasta</div>
                    <div class="cover-tagline">Your Daily Homemade Pasta</div>
                </div>
                <div class="cover-info">
                    Madukara, Banjarnegara<br>
                    Open 08.00 – 20.00 WIB<br>
                    @alepasta.co
                </div>
            </div>
            <div class="cover-right">
                <img src="assets/img/bolognese.png" alt="Cover">
            </div>
            <div class="cover-year">Menu 2026</div>
        </div>`;

    // ── CATEGORY PAGES ──
    Object.entries(menuCategories).forEach(([catName, items]) => {
        const count = items.length;

        // Grid columns: max 4, Side has 6 items → 3 cols 2 rows
        let cols, rows;
        if (count <= 3) { cols = count; rows = 1; }
        else if (count === 4) { cols = 4; rows = 1; }
        else if (count === 6) { cols = 3; rows = 2; }
        else { cols = Math.ceil(count / 2); rows = 2; }

        const gridStyle = `grid-template-columns: repeat(${cols}, 1fr); grid-template-rows: repeat(${rows}, 1fr);`;

        const cardsHtml = items.map(item => {
            const isBs = bestSellers.includes(item.nama);
            return `
                <div class="item-card">
                    <div class="item-img">
                        <img src="assets/img/${item.img}" alt="${item.nama}">
                        ${isBs ? '<div class="bs-badge">★ Best Seller</div>' : ''}
                    </div>
                    <div class="item-info">
                        <div class="item-name">${item.nama}</div>
                        <div class="item-desc">${item.desc}</div>
                        <div class="item-price">${item.harga}</div>
                    </div>
                </div>`;
        }).join('');

        wrap.innerHTML += `
            <div class="page cat-page">
                <div class="cat-strip">
                    <div class="cat-strip-text">Alepasta</div>
                </div>
                <div class="cat-body">
                    <div class="cat-head">
                        <div class="cat-head-left">
                            <div class="cat-head-label">Kategori</div>
                            <div class="cat-head-title">${catName}</div>
                        </div>
                        <div class="cat-head-right">
                            <div class="cat-head-count">${count} Menu</div>
                            <div class="cat-head-brand">Alepasta</div>
                        </div>
                    </div>
                    <div class="items-grid" style="${gridStyle}">
                        ${cardsHtml}
                    </div>
                </div>
            </div>`;
    });
</script>
</body>
</html>
