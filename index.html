    <script>
        // CONFIG DATA BRAND & LINK (Pengganti data.php)
        const brandConfig = {
            waNumber: "6281390108787",
            linkGrabfood: "https://food.grab.com/id/en/restaurant/alepasta-your-daily-homemade-pasta-pekauman-delivery/6-C72CAZEJE4MWLA?",
            linkInstagram: "https://instagram.com/alepasta.co"
        };

        // DATABASE DATA MENU (Sudah Berurutan Harga -> Alfabet)
        const menuCategories = {
            "Pasta Menu": [
                { nama: "Aglio e Olio", harga: "10k", desc: "Pasta dengan minyak bawang putih gurih dengan taburan chili flakes.", img: "aglioeolio.png" },
                { nama: "Alfredo", harga: "10k", desc: "Pasta saus putih creamy dengan aroma bawang putih yang gurih.", img: "alfredo.png" },
                { nama: "Bolognese", harga: "10k", desc: "Pasta saus Bolognese gurih dengan daging cincang yang melimpah.", img: "bolognese.png" },
                { nama: "Mac & Cheese", harga: "10k", desc: "Makaroni lembut dengan saus keju yang super creamy.", img: "macncheese.png" }
            ],
            "Rice Menu": [
                { nama: "Alepasta Bowl", harga: "12k", desc: "Nasi ayam krispi dengan lumeran saus homemade rahasia khas Alepasta.", img: "alepasta-bowl.png" },
                { nama: "Bolognese Bowl", harga: "12k", desc: "Nasi ayam krispi dengan siraman saus Bolognese premium.", img: "bolognese-bowl.png" },
                { nama: "Curry Bowl", harga: "12k", desc: "Nasi ayam krispi dengan siraman saus Kari Jepang kental.", img: "curry-bowl.png" }
            ],
            "Healthy Menu": [
                { nama: "Simple Green", harga: "10k", desc: "Salad sayur segar dengan topping 1/2 telur rebus.", img: "simple-green.png" },
                { nama: "Egg-tra Green", harga: "13k", desc: "Salad sayur segar dengan topping 1 telur rebus utuh.", img: "eggtra-green.png" },
                { nama: "Signature Green", height: "15k", desc: "Salad sayur segar dengan topping ayam panggang (grill).", img: "signature-green.png" }
            ],
            "Side Menu": [
                { nama: "Burger", harga: "10k", desc: "Burger ayam krispi dengan lumeran saus homemade khas Alepasta.", img: "burger.png" },
                { nama: "Chicken Wrap", harga: "12k", desc: "Tortilla jumbo isian ayam, selada, keju, dan saus Alepasta.", img: "wrap.png" },
                { nama: "Bolognese Fries", harga: "15k", desc: "Kentang krispi + saus bolognese daging cincang.", img: "bolognese-fries.png" },
                { nama: "Burger w/Fries", harga: "15k", desc: "Burger ayam krispi yang dipadukan dengan kentang goreng renyah.", img: "burgerwfries.png" },
                { nama: "Cheesy Fries", harga: "15k", desc: "Kentang krispi + saus keju lumer melimpah.", img: "cheesy-fries.png" },
                { nama: "Combo", harga: "15k", desc: "Paket makaroni, ayam, dan kentang dengan saus homemade.", img: "combo.png" }
            ],
            "Drink Menu": [
                { nama: "Blue Ocean Lemon", harga: "7k", desc: "Sensasi asam manis lemon dengan tampilan biru segar.", img: "blue-ocean.png" },
                { nama: "Lemon Tea", harga: "7k", desc: "Teh lemon dengan takaran asam manis yang seimbang.", img: "lemon-tea.png" },
                { nama: "Matcha", harga: "9k", desc: "Teh hijau dengan aroma khas yang autentik dan manis pas.", img: "matcha.png" },
                { nama: "Milo", harga: "9k", desc: "Racikan cokelat Milo yang kental dan pekat.", img: "milo.png" }
            ]
        };

        // SETUP DATA LINK FOOTER
        document.getElementById('footerGrab').href = brandConfig.linkGrabfood;
        document.getElementById('footerWA').href = `https://wa.me/${brandConfig.waNumber}`;
        document.getElementById('footerIG').href = brandConfig.linkInstagram;

        // DYNAMIC RENDERING: Generate Dropdown Kategori & Grid Konten Menu
        const dropdownContainer = document.getElementById('categoryDropdownItems');
        const menuContainer = document.getElementById('menuContainer');

        Object.keys(menuCategories).forEach(catName => {
            const slug = catName.toLowerCase().replace(/\s+/g, '-');
            
            // Inject Item Dropdown
            const dropEl = document.createElement('a');
            dropEl.href = `#${slug}`;
            dropEl.className = "category-filter px-4 py-2.5 text-xs font-extrabold text-[#f14e06] hover:bg-[#f14e06] hover:text-white rounded-xl transition duration-200 uppercase";
            dropEl.setAttribute('data-category', slug);
            dropEl.setAttribute('data-name', catName);
            dropEl.innerText = catName;
            dropdownContainer.appendChild(dropEl);

            // Inject Komponen Section Menu
            const secEl = document.createElement('section');
            secEl.className = "menu-section mb-24 transition-all duration-500 scroll-mt-64";
            secEl.id = slug;

            let itemsHtml = '';
            menuCategories[catName].forEach(item => {
                const isWrap = item.nama.toLowerCase().includes('wrap');
                const isPasta = (slug === 'pasta-menu');
                const hoverText = (isPasta || isWrap) ? "Pilih Opsi Menu" : "Tambah Ke Keranjang";
                const numericPrice = parseInt(item.harga);

                const safeName = item.nama.replace(/'/g, "\\'");

                itemsHtml += `
                    <div onclick="openOptionsModal('${safeName}', ${numericPrice}, '${slug}')" class="group border-b border-[#f14e06]/10 pb-10 block cursor-pointer select-none">
                        <div class="aspect-square bg-zinc-200 mb-6 overflow-hidden rounded-xl shadow-inner relative">
                            <img src="assets/img/${item.img}" alt="${item.nama}" class="w-full h-full object-cover object-center group-hover:scale-105 transition duration-700 ease-in-out">
                            <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">
                                <span class="bg-[#f1ece6] text-[#f14e06] text-xs font-black px-4 py-2 rounded-full shadow-lg transform translate-y-2 group-hover:translate-y-0 transition duration-300 uppercase tracking-wider">${hoverText}</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-start mb-3">
                            <h4 class="text-2xl font-black uppercase tracking-tight italic group-hover:text-zinc-800 transition">${item.nama}</h4>
                            <span class="text-2xl font-black italic bg-[#f14e06] text-[#f1ece6] px-2 leading-none py-1 rounded">${item.harga}</span>
                        </div>
                        <p class="text-sm opacity-70 leading-relaxed font-semibold text-zinc-700">${item.desc}</p>
                    </div>`;
            });

            secEl.innerHTML = `
                <div class="flex items-center gap-4 mb-12">
                    <h3 class="text-4xl font-black uppercase italic tracking-tighter">${catName}</h3>
                    <div class="h-[2px] flex-grow bg-[#f14e06] opacity-20"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-16">${itemsHtml}</div>`;
            
            menuContainer.appendChild(secEl);
        });

        const categoryBtn = document.getElementById('categoryBtn');
        const categoryDropdown = document.getElementById('categoryDropdown');
        const categoryArrow = document.getElementById('categoryArrow');
        const selectedCategoryText = document.getElementById('selectedCategoryText');
        
        const cartBtn = document.getElementById('cartBtn');
        const cartSidebar = document.getElementById('cartSidebar');
        const closeCartBtn = document.getElementById('closeCartBtn');
        const cartOverlay = document.getElementById('cartOverlay');
        const menuSections = document.querySelectorAll('.menu-section');

        let cart = JSON.parse(localStorage.getItem('alepasta_cart')) || [];
        let currentSelectedMenu = null;

        updateCartUI();

        categoryBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            categoryDropdown.classList.toggle('hidden');
            categoryArrow.classList.toggle('rotate-180');
        });

        document.querySelectorAll('.category-filter').forEach(link => {
            link.addEventListener('click', () => {
                selectedCategoryText.innerText = link.getAttribute('data-name');
                menuSections.forEach(sec => sec.id === link.getAttribute('data-category') ? sec.classList.remove('hidden') : sec.classList.add('hidden'));
                categoryDropdown.classList.add('hidden');
                categoryArrow.classList.remove('rotate-180');
            });
        });

        const toggleCart = () => {
            cartSidebar.classList.toggle('translate-x-full');
            cartOverlay.classList.toggle('hidden');
            document.body.classList.toggle('overflow-hidden');
        };
        cartBtn.addEventListener('click', toggleCart);
        closeCartBtn.addEventListener('click', toggleCart);
        cartOverlay.addEventListener('click', toggleCart);
        
        document.addEventListener('click', (e) => { 
            if (!categoryDropdown.contains(e.target) && e.target !== categoryBtn) { 
                categoryDropdown.classList.add('hidden'); 
                categoryArrow.classList.remove('rotate-180'); 
            } 
        });

        // MODAL ENGINE
        function openOptionsModal(name, basePrice, categorySlug) {
            currentSelectedMenu = { name: name, basePrice: basePrice, category: categorySlug };
            document.getElementById('modalMenuName').innerText = name;
            document.getElementById('modalMenuPrice').innerText = `Base Price: ${basePrice}k`;
            
            document.getElementById('pastaOptions').classList.add('hidden');
            document.getElementById('wrapOptions').classList.add('hidden');

            if (categorySlug === 'pasta-menu') {
                document.getElementById('pastaOptions').classList.remove('hidden');
                document.querySelector('input[name="pasta_spice"][value="Tidak Pedas"]').checked = true;
                document.querySelectorAll('input[name="pasta_topping"]').forEach(cb => cb.checked = false);
                document.getElementById('optionsModal').classList.remove('hidden');
            } 
            else if (name.toLowerCase().includes('wrap')) {
                document.getElementById('wrapOptions').classList.remove('hidden');
                document.querySelector('input[name="wrap_chicken"][value="Grilled Chicken"]').checked = true;
                document.getElementById('optionsModal').classList.remove('hidden');
            } 
            else {
                cartPushItem(name, basePrice, "Polos", true);
            }
        }

        function closeOptionsModal() {
            document.getElementById('optionsModal').classList.add('hidden');
            currentSelectedMenu = null;
        }

        function submitMenuOptions() {
            if (!currentSelectedMenu) return;

            let finalPricePerItem = currentSelectedMenu.basePrice;
            let variantDetails = "";

            if (currentSelectedMenu.category === 'pasta-menu') {
                const spiceLevel = document.querySelector('input[name="pasta_spice"]:checked').value;
                let selectedToppings = [];
                let toppingPriceSum = 0;
                
                document.querySelectorAll('input[name="pasta_topping"]:checked').forEach(cb => {
                    selectedToppings.push(cb.value);
                    toppingPriceSum += parseInt(cb.getAttribute('data-price'));
                });

                finalPricePerItem += toppingPriceSum;
                const toppingStr = selectedToppings.length > 0 ? ` + ${selectedToppings.join(', ')}` : '';
                variantDetails = `Lvl: ${spiceLevel}${toppingStr}`;
            } 
            else if (currentSelectedMenu.name.toLowerCase().includes('wrap')) {
                const chickenType = document.querySelector('input[name="wrap_chicken"]:checked').value;
                variantDetails = chickenType;
            }

            cartPushItem(currentSelectedMenu.name, finalPricePerItem, variantDetails, true);
            closeOptionsModal();
        }

        function cartPushItem(name, price, details, shouldOpenSidebar = false) {
            const safeKeyId = encodeURIComponent(`${name}-${details}`).replace(/%/g, '');
            const existingItem = cart.find(item => item.key === safeKeyId);
            
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({
                    key: safeKeyId,
                    name: name,
                    price: price,
                    qty: 1,
                    details: details
                });
            }
            
            localStorage.setItem('alepasta_cart', JSON.stringify(cart));
            updateCartUI();
            if(shouldOpenSidebar && cartSidebar.classList.contains('translate-x-full')) toggleCart();
        }

        function updateQty(key, change) {
            const item = cart.find(item => item.key === key);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) cart = cart.filter(i => i.key !== key);
            }
            localStorage.setItem('alepasta_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItemsContainer');
            document.getElementById('cartCount').innerText = cart.reduce((sum, i) => sum + i.qty, 0);
            
            let totalPrice = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            document.getElementById('cartTotalPrice').innerText = totalPrice + 'k';
            
            container.innerHTML = '';
            if (cart.length === 0) {
                container.innerHTML = `<div class="h-64 flex flex-col items-center justify-center text-center opacity-40"><p class="text-xs font-bold uppercase tracking-wider">Keranjang masih kosong</p></div>`;
                return;
            }

            cart.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = "flex justify-between items-center bg-white p-4 rounded-xl border border-[#f14e06]/5 shadow-sm text-zinc-800";
                
                const detailLabel = item.details !== "Polos" ? `<p class="text-[10px] font-bold text-zinc-500 uppercase tracking-wide">${item.details}</p>` : '';
                
                itemEl.innerHTML = `
                    <div>
                        <h5 class="font-extrabold text-sm uppercase">${item.name}</h5>
                        ${detailLabel}
                        <span class="text-xs font-bold text-[#f14e06]">${item.price}k / porsi</span>
                    </div>
                    <div class="flex items-center gap-3 bg-[#f1ece6] px-3 py-1.5 rounded-lg select-none">
                        <button onclick="updateQty(\'${item.key}\', -1)" class="font-black text-xs text-zinc-600 hover:text-[#f14e06] focus:outline-none">-</button>
                        <span class="text-xs font-black text-zinc-900">${item.qty}</span>
                        <button onclick="updateQty(\'${item.key}\', 1)" class="font-black text-xs text-zinc-600 hover:text-[#f14e06] focus:outline-none">+</button>
                    </div>`;
                container.appendChild(itemEl);
            });
        }

        function sendToWhatsApp() {
            if (cart.length === 0) return;

            let message = "Halo ALEPASTA, saya mau order menu ini:\n\n";
            let total = 0;

            cart.forEach((item, index) => {
                let subtotal = item.price * item.qty;
                total += subtotal;
                const optStr = item.details !== "Polos" ? ` [${item.details}]` : '';
                message += `${index + 1}. *${item.name}*${optStr} (${item.qty} Porsi) = ${subtotal}k\n`;
            });

            message += `\n*Total Estimasi:* ${total}k\n`;
            message += `Mohon diproses ya, terima kasih!`;

            window.open(`https://wa.me/${brandConfig.waNumber}?text=${encodeURIComponent(message)}`, '_blank');

            cart = [];
            localStorage.removeItem('alepasta_cart');
            updateCartUI();
            toggleCart();
        }
    </script>
</body>
</html>
